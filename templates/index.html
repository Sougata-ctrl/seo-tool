<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SEO Generator</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 700px;
            color: #fff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            margin-bottom: 15px;
            font-size: 14px;
            outline: none;
        }

        textarea {
            resize: none;
            height: 80px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #ff7a18, #ff3d00);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .output {
            margin-top: 20px;
            background: #111;
            padding: 15px;
            border-radius: 10px;
            white-space: pre-wrap;
            font-size: 13px;
            max-height: 300px;
            overflow-y: auto;
        }

        .copy-btn {
            margin-top: 10px;
            background: #00c853;
        }

        .copy-btn:hover {
            background: #00b248;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🚀 AI SEO Generator</h1>

    <form method="POST">
        <input type="text" name="name" placeholder="Enter Name (e.g. Samik Bhattacharya)" required>

        <textarea name="event" placeholder="Write event in 1–2 lines..." required></textarea>

        <button type="submit">Generate SEO</button>
    </form>

    {% if result %}
    <div class="output" id="output">
        {{ result }}
    </div>

    <button class="copy-btn" onclick="copyText()">Copy Output</button>
    {% endif %}
</div>

<script>
function copyText() {
    let text = document.getElementById("output").innerText;
    navigator.clipboard.writeText(text);
    alert("Copied!");
}
</script>

</body>
</html>
